name: Sincronizar Posts do Blog
on: 
  push:
    branches: [ main ]
    paths: [ 'content/blog/**' ]
jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - run: pip install markdown
    - run: python scripts/sync_posts.py
    - name: Commit changes
      run: |
        git config user.name "Blog Bot"
        git config user.email "actions@github.com"
        git add blog/posts/
        git diff --quiet --exit-code || git commit -m "🚀 Blog atualizado automaticamente"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
