name: Sincronizar Posts do Blog

on: 
  push:
    branches:
      - main
    paths:
      - 'content/blog/**'

jobs:
  sync-posts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install markdown

    - name: Executar Sincronização de Posts
      run: python scripts/sync_posts.py

    - name: Configurar Git
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commitar e Enviar Alterações
      run: |
        git add blog/posts/index.json blog/posts/*.html blog/posts/*.md
        git diff --quiet --exit-code || git commit -m "[Automático] Sincroniza posts do blog"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
