<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direito Trabalhista | Advogado Gabriel Corrêa</title>
    <meta name="description" content="Direito Trabalhista especializado para empregados e empresas. Atendimento online em todo o Brasil.">
    <meta http-equiv="refresh" content="3; url=trabalhista-empregado.html">
    <link rel="canonical" href="https://www.gabrielcorrea.adv.br/trabalhista-empregado.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
:root { --primary-blue: #172B41; --accent-gold: #C9A961; --whatsapp-green: #25D366; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--primary-blue); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
.redirect-box { max-width: 600px; }
.redirect-box h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; margin-bottom: 14px; }
.redirect-box h1 span { color: var(--accent-gold); }
.redirect-box p { color: rgba(255,255,255,0.75); margin-bottom: 32px; font-size: 1rem; }
.options { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.opt-btn { padding: 14px 22px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.3s; }
.opt-btn.empregado { background: linear-gradient(135deg, #172B41, #1e3a55); border: 2px solid var(--accent-gold); color: white; }
.opt-btn.empresa { background: linear-gradient(135deg, #1a3350, #243f5e); border: 2px solid #7eb8d4; color: white; }
.opt-btn:hover { transform: translateY(-3px); }
@media (max-width: 480px) { .options { flex-direction: column; } .opt-btn { justify-content: center; } }
    </style>
</head>
<body>
    <div class="redirect-box">
        <h1>Direito do <span>Trabalho</span></h1>
        <p>Esta página foi atualizada. Escolha a área que melhor descreve sua situação:</p>
        <div class="options">
            <a href="trabalhista-empregado.html" class="opt-btn empregado">
                <i class="fas fa-hard-hat"></i> Sou Empregado
            </a>
            <a href="trabalhista-empresa.html" class="opt-btn empresa">
                <i class="fas fa-building"></i> Sou Empresa
            </a>
        </div>
    </div>
    <script>
        setTimeout(() => { window.location.href = 'trabalhista-empregado.html'; }, 3000);
    </script>
</body>
